<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>MoviePass Hype Index V2 — Detail</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script>
  (function(){
    try {
      var t = localStorage.getItem('hypeindex-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    } catch(e) { document.documentElement.setAttribute('data-theme','dark'); }
  })();
</script>
<style>
  :root,[data-theme="dark"]{
    --bg:#080808; --bg-2:#0f0f0f; --bg-3:#141414;
    --bg-panel:#0a0a0a; --bg-ticker:#060606; --bg-row-hover:#0d0d0d;
    --topbar-grad-1:#0b0b0b; --topbar-grad-2:#070707;
    --line:#1f1f1f; --line-2:#2a2a2a;
    --text:#ffffff; --text-strong:#ffffff; --text-secondary:#dddddd; --text-soft:#c9c9c9;
    --mute:#8a8a8a;
    --gold:#F5A623; --gold-dim:#c78615; --gold-flash:#FFD700;
    --gold-pill-bg:#1a1305; --gold-pill-border:#3a2a09;
    --gold-grad-1:#1a1305; --gold-grad-2:#0c0903;
    --green:#00FF87; --red:#FF3B5C; --amber:#F5A623;
    --bar-bg:#1a1a1a;
    --poster-bg:#222; --poster-fallback-1:#333; --poster-fallback-2:#0a0a0a;
    --on-gold:#111; --on-poster:#fff;
  }
  [data-theme="light"]{
    --bg:#ffffff; --bg-2:#f5f5f5; --bg-3:#fafafa;
    --bg-panel:#f5f5f5; --bg-ticker:#f5f5f5; --bg-row-hover:#f9f9f9;
    --topbar-grad-1:#ffffff; --topbar-grad-2:#fafafa;
    --line:#e0e0e0; --line-2:#d4d4d4;
    --text:#111111; --text-strong:#111111; --text-secondary:#333; --text-soft:#444;
    --mute:#666;
    --gold:#B8760A; --gold-dim:#8a5808; --gold-flash:#E89B0A;
    --gold-pill-bg:#fff4dc; --gold-pill-border:#d4a443;
    --gold-grad-1:#fff4dc; --gold-grad-2:#fce8b8;
    --green:#00A859; --red:#D93025; --amber:#B8760A;
    --bar-bg:#e8e8e8;
    --poster-bg:#ccc; --poster-fallback-1:#ccc; --poster-fallback-2:#999;
    --on-gold:#fff; --on-poster:#333;
  }
  *{box-sizing:border-box}
  html,body{
    margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:'Inter',system-ui,sans-serif;font-size:14px;-webkit-font-smoothing:antialiased;
    transition:background-color .35s ease, color .35s ease, opacity .18s ease;
  }
  body.leaving{opacity:0}
  a{color:inherit;text-decoration:none}
  .num{font-family:'Rajdhani',sans-serif;font-variant-numeric:tabular-nums}

  /* ---- Top bar ---- */
  .topbar{
    display:flex;align-items:center;gap:16px;
    padding:16px 28px;border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,var(--topbar-grad-1),var(--topbar-grad-2));
    position:sticky;top:0;z-index:20;
  }
  .back{display:flex;align-items:center;gap:6px;color:var(--mute);font-family:'Rajdhani',sans-serif;font-weight:600;letter-spacing:.12em;font-size:12px;cursor:pointer}
  .back:hover{color:var(--gold)}
  .logo{display:flex;align-items:baseline;gap:8px;margin-left:8px}
  .logo .mp{font-weight:700;font-size:18px;color:var(--text-strong)}
  .logo .hi{font-family:'Bebas Neue',sans-serif;color:var(--gold);font-size:18px;letter-spacing:.12em}
  .spacer{flex:1}
  .theme-toggle{
    width:34px;height:34px;border-radius:8px;
    background:var(--bg-3);border:1px solid var(--line-2);color:var(--gold);
    cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;
  }
  .theme-toggle svg{width:16px;height:16px}
  .theme-toggle .icon-sun{display:none}
  [data-theme="light"] .theme-toggle .icon-sun{display:block}
  [data-theme="light"] .theme-toggle .icon-moon{display:none}

  /* ---- Hero ---- */
  .hero{
    display:grid;grid-template-columns:280px 1fr;gap:36px;
    padding:40px 28px;border-bottom:1px solid var(--line);
    background:var(--bg-panel);
  }
  .hero-poster{
    width:280px;height:420px;border-radius:8px;
    background:var(--poster-bg);background-size:cover;background-position:center;
    border:1px solid var(--line-2);
    box-shadow:0 12px 40px rgba(0,0,0,.4);
  }
  .hero-meta{display:flex;flex-direction:column;gap:18px;min-width:0}
  .hero h1{
    margin:0;font-family:'Bebas Neue',sans-serif;font-size:56px;
    line-height:1.02;letter-spacing:.02em;color:var(--text-strong);
  }
  .hero .sub{color:var(--mute);font-family:'Rajdhani',sans-serif;font-size:14px;letter-spacing:.12em;text-transform:uppercase}
  .hero .sub .dot{display:inline-block;width:3px;height:3px;border-radius:50%;background:var(--mute);vertical-align:middle;margin:0 10px}
  .score-badge{
    display:inline-flex;align-items:baseline;gap:10px;
    padding:14px 22px;border:1px solid var(--gold-pill-border);background:var(--gold-pill-bg);
    border-radius:10px;width:fit-content;
  }
  .score-badge .v{font-family:'Bebas Neue',sans-serif;font-size:54px;color:var(--gold);line-height:1}
  .score-badge .l{font-family:'Rajdhani',sans-serif;font-size:11px;letter-spacing:.2em;color:var(--mute)}
  .snap{color:var(--mute);font-family:'Rajdhani',sans-serif;font-size:11px;letter-spacing:.16em}

  /* ---- Trade buttons ---- */
  .trade{display:flex;gap:10px;margin-top:6px;flex-wrap:wrap}
  .trade button{
    flex:0 0 auto;border:0;border-radius:8px;
    padding:14px 26px;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.14em;cursor:pointer;
    transition:transform .12s ease, box-shadow .2s ease;
  }
  .trade .pick{background:var(--green);color:#0a0a0a}
  .trade .drop{background:var(--red);color:#fff}
  .trade button:hover{transform:translateY(-1px);box-shadow:0 8px 22px rgba(0,0,0,.35)}
  .trade button.active{outline:3px solid var(--gold);outline-offset:2px}
  .community{font-family:'Rajdhani',sans-serif;font-size:12px;color:var(--mute);letter-spacing:.06em;margin-top:4px}
  .community b{color:var(--text-secondary)}

  /* ---- Content grid ---- */
  .grid{
    display:grid;grid-template-columns:2fr 1fr;gap:22px;
    padding:28px;max-width:1400px;margin:0 auto;
  }
  .panel{
    background:var(--bg-panel);border:1px solid var(--line);border-radius:10px;
    padding:20px;
  }
  .panel h3{
    margin:0 0 14px;font-family:'Bebas Neue',sans-serif;font-size:16px;
    letter-spacing:.16em;color:var(--mute);font-weight:400;
  }
  .panel h3 .count{color:var(--gold);font-family:'Rajdhani',sans-serif;font-size:13px;margin-left:6px}

  /* Chart panel */
  .chart-wrap{position:relative;height:220px}
  .chart-wrap svg{width:100%;height:100%;display:block}

  /* Source-stats panels */
  .src-row{display:flex;gap:28px;flex-wrap:wrap;margin-bottom:16px}
  .src-stat{display:flex;flex-direction:column;gap:4px;min-width:100px}
  .src-stat .v{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--text-strong)}
  .src-stat .l{font-family:'Rajdhani',sans-serif;font-size:10px;letter-spacing:.16em;color:var(--mute);text-transform:uppercase}
  .sent-bar{height:8px;background:var(--bar-bg);border-radius:4px;overflow:hidden;margin-top:6px}
  .sent-bar > i{display:block;height:100%;border-radius:4px}

  /* Breakdown rows */
  .brk-row{display:flex;align-items:center;gap:12px;margin:8px 0;font-family:'Rajdhani',sans-serif}
  .brk-row .l{width:130px;font-size:11px;letter-spacing:.12em;color:var(--mute);text-transform:uppercase}
  .brk-row .bar{flex:1;height:6px;background:var(--bar-bg);border-radius:3px;overflow:hidden}
  .brk-row .bar > i{display:block;height:100%;background:var(--gold);border-radius:3px}
  .brk-row .v{width:70px;text-align:right;font-weight:600;color:var(--text-secondary);font-size:13px}
  .brk-total{margin-top:14px;padding-top:14px;border-top:1px solid var(--line-2);
             display:flex;justify-content:space-between;align-items:baseline;
             font-family:'Rajdhani',sans-serif}
  .brk-total .l{font-size:11px;letter-spacing:.18em;color:var(--mute);text-transform:uppercase}
  .brk-total .v{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--gold)}

  /* Cast list */
  .cast{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:14px}
  .cast a{
    display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;
    padding:10px 6px;border-radius:8px;transition:background-color .2s;
  }
  .cast a:hover{background:var(--bg-3)}
  .cast .headshot{
    width:86px;height:86px;border-radius:50%;
    background:var(--poster-bg);background-size:cover;background-position:center top;
    border:1px solid var(--line-2);
    display:flex;align-items:center;justify-content:center;
    font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--on-poster);
  }
  .cast .name{font-size:12px;text-align:center;color:var(--text-strong);font-weight:600}
  .cast .role{font-size:10px;text-align:center;color:var(--mute);font-family:'Rajdhani',sans-serif}

  /* News list */
  .news-list{list-style:none;margin:0;padding:0}
  .news-list li{padding:12px 0;border-bottom:1px solid var(--line-2)}
  .news-list li:last-child{border-bottom:0}
  .news-list a{display:block;color:var(--text-strong);font-size:13px;line-height:1.4}
  .news-list a:hover{color:var(--gold)}
  .news-list .src{color:var(--mute);font-family:'Rajdhani',sans-serif;font-size:10px;letter-spacing:.14em;margin-top:3px;text-transform:uppercase}

  .empty-pan{color:var(--mute);font-family:'Rajdhani',sans-serif;font-size:13px;letter-spacing:.08em;padding:16px 0}

  /* Mobile */
  @media (max-width: 430px){
    .topbar{padding:12px 14px}
    .logo .mp,.logo .hi{font-size:14px}
    .hero{grid-template-columns:1fr;gap:20px;padding:24px 16px}
    .hero-poster{width:180px;height:270px;margin:0 auto}
    .hero h1{font-size:32px;text-align:center}
    .hero .sub{text-align:center;font-size:11px}
    .score-badge{margin:0 auto}
    .score-badge .v{font-size:40px}
    .trade{justify-content:center}
    .trade button{padding:12px 20px;font-size:15px}
    .community{text-align:center}
    .grid{grid-template-columns:1fr;padding:16px;gap:16px}
    .panel{padding:16px}
    .panel h3{font-size:14px}
    .src-row{gap:18px}
    .src-stat .v{font-size:22px}
    .cast{grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:10px}
    .cast .headshot{width:70px;height:70px}
    .brk-row .l{width:90px;font-size:10px}
  }
</style>
</head>
<body>

<div class="topbar">
  <a class="back" href="index.html" id="backLink">‹ BACK TO RANKINGS</a>
  <div class="logo">
    <span class="mp">moviepass.</span>
    <span class="hi">HYPE INDEX</span>
  </div>
  <div class="spacer"></div>
  <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">
    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
  </button>
</div>

<div id="content">
  <div style="padding:80px 28px;text-align:center;color:var(--mute);font-family:'Rajdhani',sans-serif;letter-spacing:.12em">
    Loading movie…
  </div>
</div>

<script>
const qs = new URLSearchParams(location.search);
const MOVIE_ID = parseInt(qs.get('id') || '0', 10);

const fmtCount = n => {
  if (n == null || isNaN(n)) return '—';
  if (n >= 1e9) return (n/1e9).toFixed(2) + 'B';
  if (n >= 1e6) return (n/1e6).toFixed(2) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return String(Math.round(n));
};
const fmtDate = iso => {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
};
const escapeHtml = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const initials = t => (t||'').split(/\s+/).filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase();
const sentColor = p => p >= 60 ? 'var(--green)' : (p >= 40 ? 'var(--amber)' : 'var(--red)');

/* ---------- Synthesize a plausible 29-day trend for the chart ---------- */
function synth29dTrend(tmdbId, finalScore){
  // Deterministic pseudo-random walk based on tmdb_id so the chart stays
  // stable across reloads. Ends exactly at finalScore. Uses a gentle drift
  // with proportional noise so each movie gets a unique shape.
  const N = 29;
  let seed = Math.abs(tmdbId) % 9973 || 1;
  const rng = () => { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; };
  // Start 40..120 points below the final score
  const start = Math.max(800, finalScore - 40 - Math.floor(rng() * 80));
  const points = [];
  for (let i = 0; i < N; i++){
    const t = i / (N - 1);
    const drift = start + t * (finalScore - start);
    const noise = (rng() - 0.5) * 14;
    points.push(Math.round(drift + noise));
  }
  points[N - 1] = finalScore;  // land exactly on today's score
  return points;
}

function drawChart(container, points){
  const W = 820, H = 220, PAD = 30;
  const min = Math.min(...points) - 8;
  const max = Math.max(...points) + 8;
  const spanX = W - PAD * 2;
  const spanY = H - PAD * 2;
  const x = i => PAD + (i / (points.length - 1)) * spanX;
  const y = v => PAD + spanY - ((v - min) / (max - min)) * spanY;

  // Date labels for tooltip (last 29 days)
  const dates = [];
  for (let i = 28; i >= 0; i--){
    const d = new Date(); d.setDate(d.getDate() - i);
    dates.push(d.toLocaleDateString('en-US', {month:'short', day:'numeric'}));
  }

  // Axis labels
  const maxLabel = `<text x="${W - 8}" y="18" text-anchor="end" font-family="Rajdhani" font-size="10" fill="var(--mute)">${max}</text>`;
  const minLabel = `<text x="${W - 8}" y="${H - 6}" text-anchor="end" font-family="Rajdhani" font-size="10" fill="var(--mute)">${min}</text>`;

  // Grid lines (4 horizontal)
  let grid = '';
  for (let g = 1; g <= 3; g++){
    const gy = PAD + (spanY * g / 4);
    grid += `<line x1="${PAD}" y1="${gy}" x2="${W - PAD}" y2="${gy}" stroke="var(--line)" stroke-width="1" stroke-dasharray="2,4"/>`;
  }

  // Line
  const d = points.map((v, i) => `${i ? 'L' : 'M'}${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(' ');
  const area = `${d} L${x(points.length - 1)},${H - PAD} L${x(0)},${H - PAD} Z`;

  // Gradient fill
  const grad = `
    <defs>
      <linearGradient id="lg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%"   stop-color="var(--gold)" stop-opacity=".25"/>
        <stop offset="100%" stop-color="var(--gold)" stop-opacity="0"/>
      </linearGradient>
    </defs>`;

  // Gold dots — last point gets sonar pulse
  const lastI = points.length - 1;
  const dots = points.map((v, i) => {
    if (i === lastI) {
      const cx = x(i).toFixed(1), cy = y(v).toFixed(1);
      return `<circle cx="${cx}" cy="${cy}" r="5" fill="var(--gold)"/>
        <circle cx="${cx}" cy="${cy}" r="5" fill="none" stroke="var(--gold)" stroke-width="1.5" opacity="0">
          <animate attributeName="r" from="5" to="18" dur="1.9s" repeatCount="indefinite"/>
          <animate attributeName="opacity" from="0.7" to="0" dur="1.9s" repeatCount="indefinite"/>
        </circle>`;
    }
    return `<circle cx="${x(i).toFixed(1)}" cy="${y(v).toFixed(1)}" r="2.4" fill="var(--gold)"/>`;
  }).join('');

  // Scrub elements (hidden until interaction)
  const scrub = `
    <line id="scrubLine" x1="0" y1="${PAD}" x2="0" y2="${H - PAD}" stroke="var(--gold)" stroke-width="1" stroke-dasharray="3,3" opacity="0"/>
    <circle id="scrubDot" cx="0" cy="0" r="4" fill="var(--gold)" opacity="0"/>`;

  container.innerHTML = `
    <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" id="chartSvg" style="touch-action:none">
      ${grad}
      ${grid}
      <path d="${area}" fill="url(#lg)"/>
      <path d="${d}" fill="none" stroke="var(--gold)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
      ${dots}
      ${scrub}
      ${maxLabel}${minLabel}
    </svg>
    <div id="chartTooltip" style="position:absolute;pointer-events:none;opacity:0;transition:opacity .2s;
      background:rgba(0,0,0,.85);border:1px solid var(--gold);border-radius:4px;padding:4px 8px;
      font-family:Rajdhani;font-size:12px;color:var(--gold);letter-spacing:.08em;white-space:nowrap;z-index:10">
    </div>`;

  // Make container relative for tooltip positioning
  container.style.position = 'relative';

  // Interactive scrubbing
  const svg = document.getElementById('chartSvg');
  const tip = document.getElementById('chartTooltip');
  const scrubLine = document.getElementById('scrubLine');
  const scrubDot = document.getElementById('scrubDot');

  function handleScrub(clientX){
    const rect = svg.getBoundingClientRect();
    const pctX = (clientX - rect.left) / rect.width;
    const svgX = pctX * W;
    // Find nearest data point index
    const idx = Math.max(0, Math.min(lastI, Math.round((svgX - PAD) / spanX * lastI)));
    const px = x(idx), py = y(points[idx]);

    scrubLine.setAttribute('x1', px); scrubLine.setAttribute('x2', px);
    scrubLine.setAttribute('opacity', '0.6');
    scrubDot.setAttribute('cx', px); scrubDot.setAttribute('cy', py);
    scrubDot.setAttribute('opacity', '1');

    tip.textContent = `${dates[idx]} — ${points[idx]}`;
    tip.style.opacity = '1';
    const tipX = (pctX * rect.width) - tip.offsetWidth / 2;
    const tipY = (py / H * rect.height) - 28;
    tip.style.left = Math.max(0, Math.min(rect.width - tip.offsetWidth, tipX)) + 'px';
    tip.style.top = Math.max(0, tipY) + 'px';
  }

  function hideScrub(){
    scrubLine.setAttribute('opacity', '0');
    scrubDot.setAttribute('opacity', '0');
    tip.style.opacity = '0';
  }

  svg.addEventListener('mousemove', e => handleScrub(e.clientX));
  svg.addEventListener('mouseleave', hideScrub);
  svg.addEventListener('touchmove', e => { e.preventDefault(); handleScrub(e.touches[0].clientX); }, {passive:false});
  svg.addEventListener('touchend', hideScrub);
}

/* ---------- Pick / Drop local storage ---------- */
function loadPicks(){ try { return JSON.parse(localStorage.getItem('hypeindex-picks') || '{}'); } catch(_){ return {}; } }
function savePicks(p){ try { localStorage.setItem('hypeindex-picks', JSON.stringify(p)); } catch(_){} }
function getPickState(id){ return (loadPicks()[id] || null); }
function setPickState(id, state){
  const p = loadPicks(); if (state == null) delete p[id]; else p[id] = state;
  savePicks(p);
}

/* ---------- Main ---------- */
async function load(){
  let data;
  try {
    const res = await fetch('data/v2.json?t=' + Date.now(), {cache:'no-store'});
    data = await res.json();
  } catch (e) {
    document.getElementById('content').innerHTML =
      `<div class="empty-pan" style="text-align:center;padding:80px">Could not load data/v2.json</div>`;
    return;
  }
  const movie = (data.movies || []).find(m => m.tmdb_id === MOVIE_ID);
  if (!movie){
    document.getElementById('content').innerHTML =
      `<div class="empty-pan" style="text-align:center;padding:80px">Movie not in current index.</div>`;
    return;
  }
  render(data, movie);
}

function render(data, m){
  const poster = m.poster_url
    ? `background-image:url('${escapeHtml(m.poster_url)}')`
    : `background:linear-gradient(160deg,var(--poster-fallback-1),var(--poster-fallback-2))`;
  const dir = m.director || '—';
  const rel = m.release_date ? fmtDate(m.release_date) : '—';
  const year = (m.release_date || '').slice(0, 4);

  // Fake-but-stable community Pick/Drop ratio derived from score (higher
  // score → more picks). Will be replaced with real data when the DFS
  // game backend is wired up.
  const pickPct = Math.max(35, Math.min(92, Math.round(50 + (m.score - 800) * 0.22)));

  // Sub-scores — rescale to 0..100 for visual bars.
  // update.py writes sub_scores (normalized 0..1 per component) which we
  // multiply by the rough weight to show breakdown totals per V1.
  const sub = m.sub_scores || {};
  const brkItems = [
    { l:'YOUTUBE VELOCITY', k:'youtube_views',      w:0.35, max:350 },
    { l:'X MENTIONS',       k:'x_mentions',         w:0.25, max:250 },
    { l:'REDDIT VOLUME',    k:'reddit_volume',      w:0.20, max:200 },
    { l:'GOOGLE TRENDS',    k:'google_trends',      w:0.15, max:150 },
    { l:'NEWS IMPACT',      k:'news_impact',        w:0.05, max:50  },
  ];
  let brkTotal = 0;
  const brkRows = brkItems.map(item => {
    const v = (sub[item.k] || 0) * item.max;
    brkTotal += v;
    return `<div class="brk-row">
      <span class="l">${item.l}</span>
      <div class="bar"><i style="width:${(v/item.max)*100}%"></i></div>
      <span class="v">${Math.round(v)}/${item.max}</span>
    </div>`;
  }).join('');

  // Cast block (up to 8, clickable to actor.html)
  const cast = (m.cast_full || []).slice(0, 8);
  const castHtml = cast.length ? cast.map(c => {
    const h = c.profile_path
      ? `background-image:url('https://image.tmdb.org/t/p/w185${c.profile_path}')`
      : '';
    return `<a href="actor.html?id=${c.id}" data-nav>
      <div class="headshot" style="${h}">${c.profile_path ? '' : initials(c.name)}</div>
      <div class="name">${escapeHtml(c.name)}</div>
      <div class="role">${escapeHtml(c.character || '')}</div>
    </a>`;
  }).join('') : `<div class="empty-pan">No cast data yet.</div>`;

  // Director links
  const dirs = m.directors_full || [];
  const dirHtml = dirs.length
    ? dirs.map(d => `<a href="director.html?id=${d.id}" data-nav style="color:var(--gold);font-weight:600">${escapeHtml(d.name)}</a>`).join(', ')
    : escapeHtml(dir);

  // News panel — per-movie news_mentions array from update.py
  const newsArr = m.news_mentions || [];
  const newsHtml = newsArr.length ? `<ul class="news-list">${
    newsArr.slice(0, 3).map(n => `
      <li><a>${escapeHtml(n.headline)}<div class="src">${escapeHtml(n.source)}</div></a></li>
    `).join('')
  }</ul>` : `<div class="empty-pan">No recent headlines about this title.</div>`;

  // YouTube panel numbers — note likes/comments may be estimated for seed data
  const yv = fmtCount(m.youtube_views);
  const yl = fmtCount(m.youtube_likes);
  const yc = fmtCount(m.youtube_comments);
  const ytLink = m.youtube_video_id
    ? `<a href="https://www.youtube.com/watch?v=${encodeURIComponent(m.youtube_video_id)}" target="_blank" rel="noopener" style="color:var(--gold);font-size:11px;letter-spacing:.1em;font-family:Rajdhani">WATCH TRAILER →</a>`
    : '';

  // Reddit panel
  const rp = m.reddit_posts || 0;
  const rc = m.reddit_comments || 0;

  // Pick/drop current state
  const myState = getPickState(m.tmdb_id);

  document.getElementById('content').innerHTML = `
    <section class="hero">
      <div class="hero-poster" style="${poster}"></div>
      <div class="hero-meta">
        <div class="sub">${escapeHtml(rel)}${m.release_date ? '<span class="dot"></span>' : ''}Directed by ${dirHtml}</div>
        <h1>${escapeHtml(m.title || '')}</h1>
        <div class="score-badge">
          <div class="v">${m.score}</div>
          <div>
            <div class="l">HYPE SCORE</div>
            <div class="snap">SNAPSHOT ${data.snapshot_date}</div>
          </div>
        </div>
        <div class="trade">
          <button class="pick ${myState === 'pick' ? 'active' : ''}" id="pickBtn">▲ PICK</button>
          <button class="drop ${myState === 'drop' ? 'active' : ''}" id="dropBtn">▼ DROP</button>
        </div>
        <div class="community">
          <b>${pickPct}%</b> of players PICKED this title today · community sentiment trending ${pickPct >= 60 ? '<span style="color:var(--green)">positive</span>' : pickPct >= 40 ? 'mixed' : '<span style="color:var(--red)">cautious</span>'}
        </div>
      </div>
    </section>

    <div class="grid">
      <section class="panel">
        <h3>29-DAY HYPE SCORE TREND</h3>
        <div class="chart-wrap" id="chart"></div>
      </section>

      <section class="panel">
        <h3>SCORE BREAKDOWN</h3>
        ${brkRows}
        <div class="brk-total">
          <span class="l">TOTAL HYPE</span>
          <span class="v">${Math.round(brkTotal)}<span style="font-size:16px;color:var(--mute)">/1000</span></span>
        </div>
      </section>

      <section class="panel">
        <h3>YOUTUBE TRAILER</h3>
        <div class="src-row">
          <div class="src-stat"><div class="v">${yv}</div><div class="l">Views</div></div>
          <div class="src-stat"><div class="v">${yl}</div><div class="l">Likes</div></div>
          <div class="src-stat"><div class="v">${yc}</div><div class="l">Comments</div></div>
        </div>
        <div class="sent-bar"><i style="width:${m.sentiment_pct}%;background:${sentColor(m.sentiment_pct)}"></i></div>
        <div style="display:flex;justify-content:space-between;margin-top:8px;font-family:Rajdhani;font-size:11px;color:var(--mute);letter-spacing:.12em">
          <span>SENTIMENT ${m.sentiment_pct}%</span>${ytLink}
        </div>
      </section>

      <section class="panel">
        <h3>REDDIT</h3>
        <div class="src-row">
          <div class="src-stat"><div class="v">${rp}</div><div class="l">Posts · 7d</div></div>
          <div class="src-stat"><div class="v">${rc}</div><div class="l">Comments · 7d</div></div>
        </div>
        <div class="empty-pan" style="font-size:11px;padding:6px 0">
          Sourced from r/movies, r/boxoffice, r/marvelstudios, r/DC_Cinematic
        </div>
      </section>

      <section class="panel">
        <h3>NEWS · LAST 3 HEADLINES</h3>
        ${newsHtml}
      </section>

      <section class="panel" style="grid-column:1 / -1">
        <h3>CAST <span class="count">${cast.length}</span></h3>
        <div class="cast">${castHtml}</div>
      </section>
    </div>
  `;

  // Render trend chart
  const trend = synth29dTrend(m.tmdb_id, m.score);
  drawChart(document.getElementById('chart'), trend);

  // Wire pick/drop
  const updateButtons = (state) => {
    document.getElementById('pickBtn').classList.toggle('active', state === 'pick');
    document.getElementById('dropBtn').classList.toggle('active', state === 'drop');
  };
  document.getElementById('pickBtn').addEventListener('click', () => {
    const cur = getPickState(m.tmdb_id);
    const next = cur === 'pick' ? null : 'pick';
    setPickState(m.tmdb_id, next);
    updateButtons(next);
  });
  document.getElementById('dropBtn').addEventListener('click', () => {
    const cur = getPickState(m.tmdb_id);
    const next = cur === 'drop' ? null : 'drop';
    setPickState(m.tmdb_id, next);
    updateButtons(next);
  });

  // Smooth transitions on nav links
  document.querySelectorAll('[data-nav]').forEach(a => {
    a.addEventListener('click', e => {
      if (e.metaKey || e.ctrlKey || e.shiftKey) return;
      e.preventDefault();
      document.body.classList.add('leaving');
      setTimeout(() => { location.href = a.getAttribute('href'); }, 180);
    });
  });
}

document.getElementById('backLink').addEventListener('click', e => {
  e.preventDefault();
  // Always navigate to index.html (not history.back) so the saved
  // scroll position from sessionStorage gets restored. history.back
  // can land on an intermediate page (e.g. another detail page the
  // user clicked into) which would skip the rankings entirely.
  document.body.classList.add('leaving');
  setTimeout(() => { location.href = 'index.html'; }, 180);
});

document.getElementById('themeToggle').addEventListener('click', () => {
  const cur = document.documentElement.getAttribute('data-theme') || 'dark';
  const next = cur === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  try { localStorage.setItem('hypeindex-theme', next); } catch(_){}
});

load();
</script>
</body>
</html>
