<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mogul Hype Index V2</title>
  <!-- Inter font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Bebas+Neue&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
  <!-- Fetch polyfill -->
  <script src="https://unpkg.com/whatwg-fetch@3.6.20/dist/fetch.umd.js"></script>
  <style>
    :root {
      --bg: #080808;
      --panel: #0a0a0a;
      --line: #1f1f1f;
      --text: #ffffff;
      --muted: #8a8a8a;
      --gold: #F5A623;
      --green: #00FF87;
      --red: #FF3B5C;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; }
    .header { padding: 18px 28px; border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; }
    .logo { font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: var(--gold); }
    .logo span { color: #fff; font-family: sans-serif; font-weight: bold; }
    .market-bar { background: var(--panel); padding: 10px 28px; border-bottom: 1px solid var(--line); font-family: 'Rajdhani', sans-serif; font-size: 13px; display: flex; gap: 20px; }
    .ticker { background: #060606; height: 38px; border-bottom: 1px solid var(--line); overflow: hidden; display: flex; align-items: center; white-space: nowrap; }
    .ticker-label { background: var(--gold); color: #000; font-family: 'Bebas Neue', sans-serif; padding: 0 15px; height: 100%; display: flex; align-items: center; z-index: 2; }
    .ticker-track { display: inline-flex; animation: scroll 60s linear infinite; padding-left: 20px; }
    @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
    .movers-strip { background: var(--panel); padding: 15px 28px; border-bottom: 1px solid var(--line); overflow-x: auto; display: flex; gap: 15px; }
    .mover-card { background: #141414; border: 1px solid var(--line); padding: 10px; border-radius: 8px; min-width: 180px; display: flex; justify-content: space-between; align-items: center; }
    .tabs { padding: 15px 28px; display: flex; gap: 20px; border-bottom: 1px solid var(--line); }
    .tab { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; }
    .tab.active { color: var(--gold); border-bottom-color: var(--gold); }
    .table-container { padding: 0 28px; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th { text-align: left; font-family: 'Rajdhani', sans-serif; font-size: 11px; color: var(--muted); padding: 12px 10px; border-bottom: 1px solid var(--line); text-transform: uppercase; }
    td { padding: 15px 10px; border-bottom: 1px solid var(--line); font-size: 14px; }
    .rank { font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: var(--gold); }
    .score { font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: var(--gold); text-align: right; }
    .up { color: var(--green); } .down { color: var(--red); }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo"><span>moviepass.</span> HYPE INDEX V2</div>
    <div id="clock" style="font-family: 'Rajdhani'; font-weight: bold;">00:00:00 UTC</div>
  </div>
  <div class="market-bar" id="market-bar">
    <span>100 TITLES</span> <span class="up">↑ 42 RISING</span> <span class="down">↓ 18 FALLING</span> <span>LAST UPDATED: 00:00 UTC</span>
  </div>
  <div class="ticker">
    <div class="ticker-label">BREAKING</div>
    <div class="ticker-track" id="ticker-track"></div>
  </div>
  <div class="movers-strip" id="movers-strip"></div>
  <div class="tabs">
    <div class="tab active" onclick="setTab('projects')">MOVIES</div>
    <div class="tab" onclick="setTab('actors')">ACTORS</div>
    <div class="tab" onclick="setTab('directors')">DIRECTORS</div>
  </div>
  <div class="table-container">
    <table id="rankings-table">
      <thead>
        <tr>
          <th>RANK</th>
          <th>MOVE</th>
          <th>ENTITY</th>
          <th>MENTIONS</th>
          <th>SENTIMENT</th>
          <th style="text-align: right;">SCORE</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>

  <script>
    let currentData = null;
    let activeTab = 'projects';

    async function fetchData() {
      try {
        const response = await window.fetch('data/index.json?t=' + Date.now());
        const data = await response.json();
        currentData = data;
        render();
      } catch (e) {
        console.error("Fetch failed", e);
        document.getElementById('table-body').innerHTML = '<tr><td colspan="6" style="text-align:center; padding: 40px;">Error loading data feed.</td></tr>';
      }
    }

    function render() {
      if (!currentData) return;
      const items = currentData[activeTab] || [];
      const tbody = document.getElementById('table-body');
      tbody.innerHTML = items.map(item => `
        <tr>
          <td class="rank">${item.rank}</td>
          <td class="${item.move > 0 ? 'up' : (item.move < 0 ? 'down' : '')}">${item.move > 0 ? '↑'+item.move : (item.move < 0 ? '↓'+Math.abs(item.move) : '—')}</td>
          <td>
            <div style="font-weight: bold;">${item.title}</div>
            <div style="font-size: 11px; color: #8a8a8a;">${item.metadata.studio || item.metadata.project || ''}</div>
          </td>
          <td style="font-family: 'Rajdhani';">${item.mentions_x.toLocaleString()}</td>
          <td>
            <div style="background: #1a1a1a; width: 100px; height: 6px; border-radius: 3px;">
              <div style="background: ${item.amsi_score > 900 ? 'var(--green)' : 'var(--gold)'}; width: ${item.sentiment * 100}%; height: 100%; border-radius: 3px;"></div>
            </div>
          </td>
          <td class="score">${item.amsi_score.toFixed(1)}</td>
        </tr>
      `).join('');

      // Ticker
      const tickerTrack = document.getElementById('ticker-track');
      const news = items.slice(0, 5).map(i => `<span>● <strong>${i.title.toUpperCase()}</strong> — ${i.notes}</span>`).join(' <span style="margin: 0 20px;">|</span> ');
      tickerTrack.innerHTML = news + ' | ' + news;

      // Movers
      const moversStrip = document.getElementById('movers-strip');
      moversStrip.innerHTML = items.filter(i => i.move !== 0).slice(0, 5).map(i => `
        <div class="mover-card">
          <div>
            <div style="font-size: 12px; font-weight: bold;">${i.title}</div>
            <div class="${i.move > 0 ? 'up' : 'down'}" style="font-size: 11px;">${i.move > 0 ? '↑' : '↓'}${Math.abs(i.move)}</div>
          </div>
          <div style="color: var(--gold); font-family: 'Bebas Neue'; font-size: 18px;">${i.amsi_score.toFixed(0)}</div>
        </div>
      `).join('');
    }

    function setTab(tab) {
      activeTab = tab;
      document.querySelectorAll('.tab').forEach(el => el.classList.toggle('active', el.textContent.toLowerCase().includes(tab.slice(0, -1))));
      render();
    }

    setInterval(() => {
      const now = new Date();
      document.getElementById('clock').textContent = now.toISOString().split('T')[1].split('.')[0] + ' UTC';
    }, 1000);

    fetchData();
  </script>
</body>
</html>
