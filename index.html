<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mogul Hype Index Terminal</title>
    <style>
        body { background: #050505; color: #f5f5f5; font-family: 'Courier New', Courier, monospace; margin: 0; padding: 20px; }
        .header { border-bottom: 2px solid #ff9f00; padding-bottom: 10px; margin-bottom: 20px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { background: #222; color: #ff9f00; border: 1px solid #444; padding: 10px 20px; cursor: pointer; text-transform: uppercase; }
        .tab.active { background: #ff9f00; color: #000; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; border: 1px solid #333; text-align: left; }
        th { color: #ff9f00; text-transform: uppercase; border-bottom: 2px solid #ff9f00; }
        .up { color: #00ff00; }
        .down { color: #ff0000; }
        .loading { text-align: center; padding: 50px; font-style: italic; color: #888; }
    </style>
</head>
<body>
    <div class="header">
        <h1>MOGUL HYPE INDEX // SYSTEM_V2.9</h1>
        <div id="last-updated">Status: SYNCING...</div>
    </div>
    <div class="tabs">
        <div class="tab active" data-cat="movies">Movies</div>
        <div class="tab" data-cat="actors">Actors</div>
        <div class="tab" data-cat="directors">Directors</div>
    </div>
    <div id="content">
        <div class="loading">Fetching data.json...</div>
    </div>

    <script>
        let data = {};
        let activeCat = 'movies';
        async function refresh() {
            try {
                const r = await fetch('data.json?t=' + Date.now());
                if (!r.ok) throw new Error('HTTP ' + r.status);
                data = await r.json();
                document.getElementById('last-updated').textContent = 'Status: LIVE | Updated: ' + new Date().toLocaleTimeString();
                render();
            } catch (e) {
                document.getElementById('last-updated').textContent = 'Status: ERROR';
                document.getElementById('content').innerHTML = '<div class="loading" style="color:red">Error loading data.json: ' + e.message + '</div>';
            }
        }
        function render() {
            let items = data[activeCat] || data.top_100 || [];
            if (!items.length && data.movies) items = data.movies;

            let html = '<table><thead><tr><th>Rank</th><th>Change</th><th>Entity</th><th>Score</th><th>Mentions</th><th>Notes</th></tr></thead><tbody>';
            items.forEach(i => {
                const move = Number(i.change_24h || i.change || 0);
                const moveClass = move > 0 ? 'up' : (move < 0 ? 'down' : '');
                const mentions = Number(i.mentions_x || i.mentions || 0);
                html += `'<tr>
                    <td style="font-weight:bold;color:#ffd166">${i.rank}</td>
                    <td class="${moveClass}">${move > 0 ? '+' : ''}${move}</td>
                    <td style="color:#fff;font-weight:bold">${i.entity || i.name}</td>
                    <td style="font-weight:bold">${i.score}</td>
                    <td>${Number(i.mentions_x || i.mentions || 0).localeString()}</td>
                    <td style="font-size:11px;color:#bbb">${i.notes || ''}</td>
                </tr>`;
            });
            html += '</tbody></table>';
            document.getElementById('content').innerHTML = html;
        }
        document.querySelectorAll('.tab').forEach(btn => {
            btn.onclick = () => {
                activeCat = btn.dataset.cat;
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                btn.classList.add('active');
                render();
            };
        });

        refresh();
        setInterval(refresh, 300000);
    </script>
</body>
</html>
