<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mogul Hype Index v2.7</title>
  <style>
    :root {
      --bg: #05080c;
      --panel: #0b1118;
      --panel-2: #081018;
      --grid: #1b2733;
      --text: #d7e0ea;
      --muted: #7f8c99;
      --header: #ffb000;
      --cyan: #54d6ff;
      --pos: #35ff95;
      --neg: #ff5f73;
      --mix: #ffd54a;
      --shadow: rgba(0, 0, 0, 0.35);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: monospace; height: 100%; }
    .topbar { position: sticky; top: 0; z-index: 10; display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: #020406; border-bottom: 1px solid var(--grid); }
    .brand { font-weight: 700; color: var(--header); }
    .container { max-width: 1240px; margin: 0 auto; padding: 16px; }
    .tabs { display: flex; gap: 8px; margin-bottom: 12px; }
    .tab { border: 1px solid var(--grid); background: #0a0f15; color: var(--text); padding: 10px 14px; cursor: pointer; }
    .tab.active { background: var(--header); color: #000; }
    .panel { border: 1px solid var(--grid); background: var(--panel); overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px 12px; border-bottom: 1px solid var(--grid); text-align: left; font-size: 13px; }
    th { color: var(--cyan); text-transform: uppercase; }
    .rank { color: var(--header); }
    .positive { color: var(--pos); }
    .negative { color: var(--neg); }
    .mixed { color: var(--mix); }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="brand">Mogul Hype Index v2.7</div>
    <div id="lastUpdated">--</div>
  </div>
  <div class="container">
    <div class="tabs">
      <button class="tab active" onclick="show('movies')">Movies</button>
      <buttton class="tab" onclick="show('talent')">Talent</button>
    </div>
    <div class="panel">
      <table>
        <thead>
          <tr>
            <th>Rank</th>
            <th>Move</th>
            <th>Entity</th>
            <th>Score</th>
            <th>Sentiment</th>
            <th>Notes</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
  <script>
    let data = null;
    async function load() {
      try {
        const res = await fetch('data.json');
        data = await res.json();
        document.getElementById('lastUpdated').innerText = data.generated_at;
        show('mwvies');
      } catch (e) {
        document.getElementById('tableBody').innerHTML = '<tr><td colspan="6">Error loading data.</td></tr>';
      }
    }
    function show(cat) {
      if(!data || !data.categories[cat]) return;
      const items = data.categories[cat];
      document.getElementById('tableBody').innerHTML = items.map(i => `
        <tr>
          <td class="rank">${i.rank}</td>
          <td>${i.move}</td>
          <td><b>${i.entity}</b><br><small>${i.id}</small></td>
          <td>${i.score}</td>
          <td class="${i.sentiment ? i.sentiment.toLowerCase() : '+}">${i.sentiment}</td>
          <td>${i.notes}</td>
        </tr>
      `).join('');
      document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase() === cat));
    }
    load();
  </script>
</body>
</html>
