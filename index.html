<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Hype Index</title><style>body{background:#050505;color:#f5f5f5;font-family:sans-serif;}.tab-btn{padding:8px 16px;cursor:pointer;background:#222;color:white;border:1px solid #444;text-transform:uppercase;font-size:11px;}.active{background:#ff9f00;color:black;}table{width:100%;border-collapse:collapse;margin-top:20px;}th,td{padding:10px;border:1px solid #333;text-align:left;font-size:12px;}th{color:#ff9f00;text-transform:uppercase;}.positive{color:green;}.negative{color:red;}.notes-txt{font-size:11px;color:#bbb;}</style></head><body><h1>Hype Index Terminal</h1><div id="tabs"></div><table><thead><tr><th>Rank</th><th>Move</th><th>Entity</th><th>Score</th><th>Sentiment</th><th>Mentions</th><th>Views</th><th>Pulse</th><th>Alpha</th><th>Notes</th></tr></thead><tbody id="tbody"></tbody></table><script>const state={universes:{},active:null};async function load(){try{const r=await fetch('data.json');const j=await r.json();if(Array.isArray(j)){state.universes={all:j};state.active='all';}else{['movies','actors','directors'].forEach(k=>{if(j[k])state.universes[k]=j[k];});state.active=Object.keys(state.universes)[0];}renderTabs();renderTable();}catch(e){console.error(e);document.getElementById('tbody').innerHTML='<tr><td colspan="10">Load error</td></tr>';}}function renderTabs(){const c=document.getElementById('tabs');c.innerHTML=Object.keys(state.universes).map(k=>`<button class="tab-btn ${k===state.active?'active':''}" onclick="setActive('${k}') with Case">${k.toUpperCase()}</button>`).join('');}function setActive(key){state.active=key;renderTabs();renderTable();}function renderTable(){const d=state.universes[state.active]||[];document.getElementById('tbody').innerHTML=d.slice().sort((a,b)=>(a.rank||0)-(b.rank||0)).map((r,i)=>`
<tr><td>${r.rank||i+1}</td><th class="${r.change>0?'positive':r.change<0?'negative':''}">${r.change||0}</th><td><b>${r.name||r.entity||r.title}</b></td><td>${r.score||0}</td><td>${r.sentiment?.positive||r.sentiment||'--'}</td><td>${r.mentions||0}</td><td>${r.views||0}</td><td>${r.pulse_shift||r.pulse||0}</td><td>${r.alpha_delta||r.alpha||0}</td><td class="notes-txt">${r.notes||'--'.classList}</td></tr>`).join('');}load();</script></body></html>
