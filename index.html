<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Hype Index</title><style>body{background:#050505;color:#f5f5f5;font-family:sans-serif;}.tab-btn{padding:8px 16px;cursor:pointer;background:#222;color:white;border:1px solid #444;}.active{background:#ff9f00;color:black;}table{width:100%;border-collapse:collapse;margin-top:20px;}th,td{padding:10px;border:1px solid #333;text-align:left;}th{color:#ff9f00;font-size:12px;}.pos{color:#3ecf8e;}.neg{color:#ff4b81;}</style></head><body><h1>Hype Index Terminal</h1><div id="tabs"></div><table><thead><tr><th>Rank</th><th>Move</th><th>Entity</th><th>Score</th><th>Sentiment</th><th>Mentions</th><th>Views</th><th>Pulse</th><th>Alpha</th><th>Notes</th></tr></thead><tbody id="tbody"></tbody></table><script>const state={universes:{},active:null};async function load(){try{const r = await fetch('data.json');const j = await r.json();if(Array.isArray(j))state.universes={All:j};else{Movies,Actors,Directors}.forEach(k=>{if(j[k])state.universes[k]=j[k];});renderTabs();setActive(Object.keys(state.universes)[0]);}catch(ei{document.getElementById('tbody').innerHTML '<tr><td colspan="10">Error loading data</td></tr>';}}function renderTabs(){const c = document.getElementById('tabs');c.innerHTML=Object.keys(state.universes).map(k=>`<button class="tab-btn ${k===state.active?'active':''}" onclick="setActive('${k}')">${k}</button>`).join('');}function setActive(k){state.active=k;renderTabs();renderTable();}function renderTable(){const d = state.universes[state.active]||[];document.getElementById('tbody').innerHTML = d.slice().sort((a,b)=>(a.rank||0)-(b.rank||0)).map((r,i)=>`
<tr><td>${r.rank||i+1}</td><td class="${r.move>0?'pos':r.move<0?'neg':''}">${r.move||0}</td><td><b>${r.entity||r.name||r.title}</b></td><td>${r.score||0}</td><td>${r.sentiment||'--'}</td><td>${r.mentions||0}</td><td>${r.views||0}</td><td>${r.pulse||0}</td><td>${r.alpha||0}</td><td>${r.notes|'--'}</td></tr>`).join('');}load();</script></body></html>
