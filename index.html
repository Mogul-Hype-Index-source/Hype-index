<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mogul Hype Index Terminal</title>
    <style>
        body { background: #050505; color: #f5f5f5; font-family: 'Courier New', Courier, monospace; margin: 0; padding: 20px; }
        .header { border-bottom: 2px solid #ff9f00; padding-bottom: 10px; margin-bottom: 20px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { background: #222; color: #ff9f00; border: 1px solid #444; padding: 10px 20px; cursor: pointer; text-transform: uppercase; }
        .tab.active { background: #ff9f00; color: #000; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; border: 1px solid #333; text-align: left; }
        th { color: #ff9f00; text-transform: uppercase; border-bottom: 2px solid #ff9f00; }
        .up { color: #00ff00; }
        .down { color: #ff0000; }
        .loading { text-align: center; padding: 50px; font-style: italic; color: #888; }
    </style>
</head>
<body>
    <div class="header">
        <h1>MOGUL HYPE INDEX // SYSTEM_V2.9</h1>
        <div id="last-updated">Status: SYNCING...</div>
    </div>
    <div class="tabs">
        <div class="tab active" data-cat="movies">Movies</button>
        <div class="tab" data-cat="actors">Actors</div>
        <div class="tab" data-cat="directors">Directors</div>
    </div>
    <div id="content">
        <div class="loading">Fetching data.json...</div>
    </div>

    <script>
        let data = {};
        let activeCat = 'movies';

        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;2)
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function getItems() {
            if (activeCat === 'actors') return Array.isArray(data.actors) ? data.actors : (Array.isArray(data.top_100) ? data.top_100 : []);
            if (activeCat === 'directors') return Array.isArray(data.directors) ? data.directors : (Array.isArray(data.top_100) ? data.top_100 : []);
            return Array.isArray(data.movies) ? data.movies : (Array.isArray(data.top_100) ? data.top_100 : []);
        }

        async function refresh() {
            try {
                const r = await fetch('data.json?t=' + Date.now(), { cache: 'no-store' });
                if (!r.ok) throw new Error('HTTP ' + r.status);
                data = await r.json();
                document.getElementById('last-updated').textContent = 'Status: LIVE | Updated: ' + new Date().toLocaleTimeString();
                render();
            } catch (e) {
                document.getElementById('last-updated').textContent = 'Status: ERROR';
                document.getElementById('content').innerHTML = '<div class="loading" style="color:red">Error loading data.json</div>';
            }
        }

        function render() {
            const items = getItems();

            if (!items.length) {
                document.getElementById('content').innerHTML = '<div class="loading">No data available.</div>';
                return;
            }

            let html = '<table><thead><tr><th>Rank</th><th>Change</th><th>Entity</th><th>Score</th><th>Mentions</th><th>Notes</th></tr></thead><tbody>';
            items.forEach(i => {
                const move = Number(i.change_24h ?? i.change ?? 0);
                const moveClass = move > 0 ? 'up' : (move < 0 ? 'down' : '');
                const mentions = Number(i.mentions_x ?? i.mentions ?? 0);
                html += `<tr>
                    <td>${escapeHtml(i.rank ?? '')}</td>
                    <td class="${moveClass}">${move > 0 ? '+' : ''}${escapeHtml(move)}</td>
                    <td><b>${escapeHtml(i.entity ?? i.name ?? '')}</b></td>
                    <td>${escapeHtml(i.score ?? '')}</td>
                    <td>${escapeHtml(mentions.toLocaleString())}</td>
                    <td style="font-size:11px;color:#bbb">${escapeHtml(i.notes ?? '')}</td>
                </tr>`;
            });
            html += '</tbody></table>';
            document.getElementById('content').innerHTML = html;
        }

        document.querySelectorAll('.tab').forEach(btn => {
            btn.onclick = () => {
                activeCat = btn.dataset.cat;
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                btn.classList.add('active');
                render();
            };
        });

        refresh();
        setInterval(refresh, 300000);
    </script>
</body>
</html>
