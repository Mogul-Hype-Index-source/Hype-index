<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hype Index v2.6</title>
  <style>
    :root{
      --bg:#050505;
      --panel:#0b0b0b;
      --panel-2:#101010;
      --grid:#2a2108;
      --text:#ffbf3f;
      --text-dim:#c9971a;
      --accent:#ff9f0a;
      --accent-2:#ffd166;
      --green:#4cff88;
      --red:#ff5e5e;
      --blue:#7ac7ff;
      --gray:#a18a52;
    }
    *{box-sizing:border-box}
    html,body{margin:0;background:var(--bg);color:var(--text);font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono",monospace}
    body{min-height:100vh}
    .wrap{max-width:1440px;margin:0 auto;padding:12px 16px 24px}
    .topline{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 0 12px;border-bottom:1px solid var(--grid)}
    .brand{display:flex;align-items:center;gap:12px}
    .brand h1{margin:0;font-size:20px;letter-spacing:.08em}
    .version{color:var(--accent-2);border:1px solid var(--grid);padding:3px 8px;background:var(--panel)}
    .meta{font-size:12px;color:var(--text-dim);text-align:right}
    .ticker{margin:12px 0;border:1px solid var(--grid);background:linear-gradient(180deg,var(--panel),var(--panel-2));overflow:hidden;white-space:nowrap}
    .ticker-track{display:inline-block;padding:10px 0;min-width:100%;animation:scroll 40s linear infinite}
    .ticker-item{display:inline-block;padding:0 28px;color:var(--accent-2)=
    .ticker-label{display:inline-block;padding:10px 14px;background:#171300;border-right:1px solid var(--grid);color:#fff1bf;font-weight:700}
    @keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
    .controls{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin:12px 0}
    .tabs{display:flex;gap:8px}
    .tab{background:var(--panel);border:1px solid var(--grid);color:var(--text);padding:10px 14px;cursor:pointer;text-transform:uppercase;letter-spacing:.08em}
    .tab.active{background:var(--accent);color:#120b00;border-color:var(--accent)}
    .chips{display:flex;gap:8px;flex-wrap:wrap}
    .chip{border:1px solid var(--grid);padding:8px 10px;background:var(--panel);font-size:12px;color:var(--accent-2)}
    .table-card{border:1px solid var(--grid);background:linear-gradient(180deg,var(--panel),#070707)}
    .table-wrap{overflow:auto}
    table{width:100%;border-collapse:collapse;min-width:1200px}
    thead th{position:sticky;top:0;background:#130f02;color:#fff1bf;text-align:left;font-size:12px;padding:12px 10px;border-bottom:1px solid var(--grid);text-transform:uppercase;letter-spacing:.08em}
    tbody td{padding:10px;border-bottom:1px solid #171307;font-size:13px;vertical-align:top}
    tbody tr:hover{background:#0f0d05}
    .num{text-align:right}
    .move.up{color:var(--green)}
    .move.down{color:var(--red)}
    .move.flat{color:var(--gray)}
    .sentiment{display:inline-block;border:1px solid var(--grid);padding:2px 8px;text-transform:uppercase;font-size:11px}
    .sentiment.positive{color:var(--green)}
    .sentiment.negative{color:var(--red)}
    .sentiment.neutral{color:var(--blue)}
    .sentiment.controversy{color:#ff7ad9}
    .id{color:var(--text-dim)}
    .notes{color:#f8d27a;max-width:560px}
    .footer{margin-top:10px;font-size:12px;color:var(--text-dim);display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap}
    .error{color:var(--red);padding:16px;border:1px solid #3f120f;background:#180807}
    @media (max-width:720px){
      .brand h1{font-size:16px}
      .meta{width:100%;text-align:left}
      .ticker-track{animation-duration:55s}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topline">
      <div class="brand">
        <h1>HYPE INDEX</h1>
        <div class="version">v2.6</div>
      </div>
      <div class="meta">
        <div id="updated">LAST UPDATE: --</div>
        <div>AUTO REFRESH: 60 MIN</div>
      </div>
    </div>

    <div class="ticker">
      <span class="ticker-label">PULSE</span>
      <div class="ticker-track" id="tickerTrack"></div>
    </div>

    <div class="controls">
      <div class="tabs">
        <button class="tab active" data-tab="movies">Movies</button>
        <button class="tab" data-tab="talent">Talent</button>
      </div>
      <div class="chips">
        <div class="chip" id="countChip">TOTAL ENTITIES: --</div>
        <div class="chip" id="leaderChip">LEADER: --</div>
        <div class="chip" id="windowChip">WINDOWED MENTIONS_X</div>
      </div>
    </div>

    <div class="table-card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th class="num">Rank</th>
              <th class="num">Move</th>
              <th>ID</th>
              <th>Name</th>
              <th class="num">Hype</th>
              <th class="num">NIS</th>
              <th class="num">Mentions_X</th>
              <th>Sentiment</th>
              <th>Notes</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr><td colspan="9">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="footer">
      <div>STYLE: BLOOMBERG TERMINAL / DARK MODE</div>
      <div>DATA SOURCE: data.json</div>
    </div>
  </div>

  <script>
    const STATE = { active: "movies", data: null };

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function formatMove(n) {
      if (n > 0) return `<span class="move up">+${n}</span>`;
      if (n < 0) return `<span class="move down">${n}</span>`;
      return `<span class="move flat">0</span>`;
    }

    function sentimentBadge(value) {
      return `<span class="sentiment ${escapeHtml(value)}">${escapeHtml(value)}</span>`;
    }

    function renderTicker(data) {
      const target = document.getElementById("tickerTrack");
      const items = (data.pulse && data.pulse.length)
        ? data.pulse
        : [
            `${data.movies[0].name} leads movies`,
            `${data.talent[0].name} leads talent`
          ];
      const html = items.concat(items).map(item => `<span class="ticker-item">${escapeHtml(item)}</span>`).join("");
      target.innerHTML = html;
    }

    function renderSummary() {
      const data = STATE.data;
      const list = data[STATE.active] || [];
      const leader = list[0];
      document.getElementById("countChip").textContent = `TOTAL ENTITIES: ${data.counts.total} | ${STATE.active.toUpperCase()}: ${list.length}`;
      document.getElementById("leaderChip").textContent = leader
        ? `LEADER: #${leader.rank} ${leader.name.toUpperCase()} | HYPE ${leader.hype_score} | NIS ${leader.news_impact_score}`
        : "LEADER: --";
      document.getElementById("updated").textContent = `LAST UPDATE: ${data.generated_at}`;
    }

    function renderTable() {
      const tbody = document.getElementById("tableBody");
      const list = (STATE.data && STATE.data[STATE.active]) ? STATE.data[STATE.active] : [];
      if (!list.length) {
        tbody.innerHTML = `<tr><td colspan="9">No data.</td></tr>`;
        return;
      }
      tbody.innerHTML = list.map(row => `
        <tr>
          <td class="num">${row.rank}</td>
          <td class="num">${formatMove(row.move)}</td>
          <td class="id">${escapeHtml(row.id)}</td>
          <td>${escapeHtml(row.name)}</td>
          <td class="num">${row.hype_score}</td>
          <td class="num">${row.news_impact_score}</td>
          <td class="num">${row.mentions_x.toLocaleString()}</td>
          <td>${sentimentBadge(row.sentiment)}</td>
          <td class="notes">${escapeHtml(row.notes)}</td>
        </tr>
      `).join("");
    }

    async function fetchData() {
      try {
        const res = await fetch(`data.json?ts=${Date.now()}`, { cache: "no-store" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        STATE.data = await res.json();
        renderTicker(STATE.data);
        renderSummary();
        renderTable();
      } catch (err) {
        document.getElementById("tableBody").innerHTML = `<tr><td colspan="9"><div class="error">DATA LOAD FAILED: ${escapeHtml(err.message)}</div></td></tr>`;
      }
    }

    document.querySelectorAll(".tab").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(el => el.classList.remove("active"));
        btn.classList.add("active");
        STATE.active = btn.dataset.tab;
        if (STATE.data) {
          renderSummary();
          renderTable();
        }
      });
    });

    fetchData();
    setInterval(fetchData, 60 * 60 * 1000);
  </script>
</body>
</html>
