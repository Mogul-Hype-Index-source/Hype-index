<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hype Index v2 — Milestone 1</title>
  <style>
    :root {
      --bg: #05080d;
      --panel: #0b1118;
      --panel-2: #101822;
      --grid: #1d2935;
      --text: #e6edf3;
      --muted: #8b99a8;
      --accent: #ff9f1c;
      --accent-2: #ffbf69;
      --good: #3ddc97;
      --bad: #ff5d73;
      --warn: #ffd166;
      --flat: #7b8794;
      --shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background: radial-gradient(circle at top right, rgba(255, 159, 28, 0.08), transparent 28%), linear-gradient(180deg, #05080d 0%, #060b12 100%);
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }
    body { padding: 16px; }
    .app { max-width: 1560px; margin: 0 auto; border: 1px solid var(--grid); background: rgba(6, 11, 18, 0.94); box-shadow: var(--shadow); }
    .topbar { display: flex; justify-content: space-between; align-items: center; padding: 14px 18px; border-bottom: 1px solid var(--grid); background: linear-gradient(180deg, rgba(255, 159, 28, 0.12), rgba(255, 159, 28, 0.03)); }
    .brand-title { font-size: 22px; font-weight: 800; color: var(--accent-2); text-transform: uppercase; }
    .ticker-shell { margin: 12px 18px 0; display: grid; grid-template-columns: 130px 1fr; border: 1px solid var(--grid); background: var(--panel); }
    .ticker-label { display: flex; align-items: center; justify-content: center; padding: 10px 12px; background: var(--accent); color: #000; font-size: 12px; font-weight: 800; }
    .ticker-track { display: flex; gap: 28px; padding: 10px; animation: ticker 40s linear infinite; white-space: nowrap; }
    @keyframes ticker { from { transform: translateX(0); } to { transform: translateX(-50%); } }
    .toolbar { padding: 14px 18px; display: flex; gap: 10px; }
    .tab { border: 1px solid var(--grid); background: var(--panel); color: var(--muted); padding: 10px 14px; cursor: pointer; }
    .tab.active { background: var(--accent); color: #000; font-weight: 800; }
    .table-wrap { margin: 0 18px 18px; border: 1px solid var(--grid); overflow: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 1200px; }
    th { background: #0f1721; color: var(--accent-2); padding: 12px; text-align: left; font-size: 11px; text-transform: uppercase; }
    td { padding: 12px; border-bottom: 1px solid var(--grid); font-size: 13px; }
    .move-up { color: var(--good); }
    .move-down { color: var(--bad); }
    .score-pill { font-weight: 800; color: var(--accent); }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand-title">Hype Index v2</div>
      <div id="lastUpdated">Last Updated: --</div>
    </header>
    <section class="ticker-shell">
      <div class="ticker-label">Live Feed</div>
      <div class="ticker-track" id="ticker">Loading...</div>
    </section>
    <section class="toolbar">
      <button class="tab active" data-tab="movies">Movies</button>
      <button class="tab" data-tab="actors">Actors</button>
      <button class="tab" data-tab="directors">Directors</button>
    </section>
    <div class="table-wrap">
      <table id="table">
        <thead>
          <tr>
            <th>Rank</th>
            <th>Move</th>
            <th>Entity</th>
            <th>Score</th>
            <th>Sentiment</th>
            <th>Mentions</th>
            <th>Views</th>
            <th>Pulse</th>
            <th>Alpha</th>
            <th>Notes</th>
          </tr>
        </thead>
        <tbody id="body"></tbody>
      </table>
    </div>
  </div>
  <script>
    let data = {};
    async function load() {
      const res = await fetch('data.json', {cache: 'no-store'});
      data = await res.json();
      render('movies');
      document.getElementById('lastUpdated').innerText = 'Last Updated: ' + data.meta.lastUpdated;
    }
    function render(tab) {
      document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
      const rows = data[tab] || [];
      document.getElementById('body').innerHTML = rows.map(i => `
        <tr>
          <td>#${i.rank}</td>
          <td class="${i.change > 0 ? 'move-up' : 'move-down'}">${i.change > 0 ? '▲' : '▼'} ${Math.abs(i.change)}</td>
          <td><strong>${i.name}</strong></td>
          <td class="score-pill">${i.score.toFixed(1)}</td>
          <td>${i.sentiment.positive}% pos</td>
          <td>${(i.mentions/1e3).toFixed(1)}K</td>
          <td>${(i.views/1e6).toFixed(1)}M</td>
          <td>${i.pulse_shift}</td>
          <td>${i.alpha_delta}</td>
          <td style="color:#8b99a8">${i.notes}</td>
        </tr>
      `).join('');
    }
    document.querySelectorAll('.tab').forEach(b => b.onclick = () => render(b.dataset.tab));
    load();
  </script>
</body>
</html>
