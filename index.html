<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>Mogul Hype Index v2.9 — Parity Build</title>
  <style>
    :root {
      --bg-main: #020202;
      --bg-panel: #050608;
      --bg-header: #101010;
      --bg-table-header: #151515;
      --bg-row-alt: #080909;
      --bg-row-hover: #111111;
      --border-soft: #333333;
      --border-strong: #555555;
      --text-main: #e0e0e0;
      --text-muted: #8a8a8a;
      --text-soft: #a5a5a5;
      --accent-green: #00ff41;
      --accent-red: #ff4b4b;
      --accent-yellow: #ffd400;
      --accent-blue: #4dd0ff;
      --accent-orange: #ffb347;
      --ticker-bg: #050505;
      --ticker-text: #f6ff00;
      --shadow-soft: 0 0 24px rgba(0, 255, 65, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: radial-gradient(circle at top, #101010 0, #020202 60%, #000000 100%);
      color: var(--text-main);
      font-family: 'IBM Plex Mono', 'SF Mono', Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: stretch;
      padding: 12px;
    }

    .terminal-shell {
      background: var(--bg-main);
      border: 1px solid var(--border-strong);
      box-shadow: var(--shadow-soft);
      max-width: 1320px;
      width: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header.terminal-header'>
      <div class='terminal-header-top'>
        <div class='brand-lockup'>
          <div class='brand-title'>Mogul Hype Index</div>
          <div class='brand-version'>v2.9 · Parity Build</div>
        </div>
        <div class='header-meta'>
          <span class='header-meta-label'>Last Sync</span>
          <span id='last-updated-value' class='header-meta-value'>Static seed · awaiting live data</span>
          <span class='header-meta-label'>Universe</span>
          <span class='header-meta-value'>Top 100 · Movies / Actors / Directors</span>
        </div>
      </div>
      <div class='header-subtitle'>Bloomberg-style hype index tracking real-time attention, sentiment, and alpha across filmed entertainment.</div>
    </header>

    <div class='ticker' id='news-ticker'>
      <div class='ticker-label'>Mover Notes</div>
      <div class='ticker-track-container'>
        <div class='ticker-track' id='ticker-track'>
          <!-- Static seed ticker items; will be replaced when live data loads -->
          <span class='ticker-item'><span class='ticker-category'>MOVIES</span><span class='ticker-rank'>#1 Dune: Part Two</span><span class='ticker-divider'>|</span>Record-breaking overseas opening drives surge in social buzz.</span>
          <span class='ticker-item'><span class='ticker-category'>MOVIES</span><span class='ticker-rank'>#4 The Batman: Part II</span><span class='ticker-divider'>|</span>Set photos leak fuels villain-speculation spike.</span>
          <span class='ticker-item'><span class='ticker-category'>MOVIES</span><span class='ticker-rank'>#10 Past Lives</span><span class='ticker-divider'>|</span>Word-of-mouth and awards reappraisal power late-stage climb.</span>
          <span class='ticker-item'><span class='ticker-category'>ACTORS</span><span class='ticker-rank'>#1 Timothée Chalamet</span><span class='ticker-divider'>|</span>Press tour clips from sci-fi tentpole dominate fan feeds.</span>\
          <span class='ticker-item'><span class='ticker-category'>ACTORS</span><span class='ticker-rank'>#2 Zendaya</span><span class='ticker-divider'>|</span>Red-carpet moments trend across fashion and film verticals.</span>
          <span class='ticker-item'><span class='ticker-category'>DIRECTORS</span><span class='ticker-rank'>#2 Greta Gerwig</span><span class='ticker-divider'>|</span>Next-project rumors ignite debate on franchise vs. original IP.</span>
        </div>
      </div>
    </div>

    <nav class='tabs'>
      <button type='button' class='tab-button active' data-category='movies'>Movies</button>
      <button type='button' class='tab-button' data-category='actors'>Actors</button>
      <button type='buttton' class='tab-button' data-category='directors'>Directors</button>
    </nav>

    <main class='terminal-main'>
      <section id='panel-movies' class='panel active'>
        <div class='table-container'>
          <table class='hype-table' aria-label='Movies Hype Index Top 100'>
            <thead class='hype-head'>
              <tr>
                <th class='col-rank'>Rank</th>
                <th class='col-move'>Move</th>
                <th class='col-entity'>Title</th>
                <th class='col-score'>Score</th>
                <th class='col-sentiment'>Sentiment %</th>
                <th class='col-mentions'>Mentions (24h)</th>
                <th class='col-views'>Views (24h)</th>
                <th class='col-pulse'>Pulse Shift</th>
                <th class='col-alpha'>Alpha &#916;</th>
                <th class='col-notes'>Mover Notes</th>
              </tr>
            </thead>
            <tbody id='table-body-movies' class='hype-body'>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>
  <script>
    (function () {
      'use strict';
      // ... logic here ...
    })();
  </script>
</body>
</html>
