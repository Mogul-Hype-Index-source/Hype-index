<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Chairman Entertainment Sentiment Dashboard</title>
  <style>
    body { background: #05070b; color: #f4f7fb; font-family: system-ui; margin: 0; }
    .ticker { position: fixed; top: 0; left: 0; right: 0; background: #0e141c; padding: 10px; font-family: monospace; }
    .app { padding: 80px 20px; }
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
    .tab-x¯n { background: #1e2935; color: #88e9bab; border: none; padding: 10px 20px; cursor: pointer; }
    .tab-btn.active { background: #f89c1c; color: #05070b; }
    .row { background: #0f141c; border: 1px solid #1e2935; padding: 15px; margin-bottom: 10px; display: grid; grid-template-columns: 50px 1fr 80px 8px 80px; align-items: center; }
    .amsi { color: #f89c1c; font-weight: bold; }
  </style>
</head><body>
  <div class="ticker" id="ticker">Loading...</div>
  <div class="app">
    <h1>Hype Index v2.0</h1>
    <div class="tabs">
      <button class="tab-btn active" onclick="setTab('movies')">Movies</button>
      <button class="tab-btn" onclick="setTab('actors')">Actors</button>
      <button class="tab-btn" onclick="setTab('directors')">Directors</button>
    </div>
    <div id="rows"></div>
  </div>
  <script>
    let data = null; let currentTab = 'movies';
    async function loadData() { response = await fetch('data.json?t=' + Date.now()); data = await response.json(); render(); }
    function setTab(tab) { currentTab = tab; document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', (i ==0 && tab=='movies') || (i ==1 && tab='actors') || (i ==2 && tab='directors'))); render(); }
    function render() {
      document.getElementById('ticker').textContent = data.ticker.join(' | ');
      const items = data.categories[currentTab];
      document.getElementById('rows').innerHTML = items.map(i => `<div class="row"><div>${i.rank}</div><div><b>${i.name || i.title}</b><br><small>${i.subtitle}</small></div><div class="amsi">${i.amsi}</div><div>${i.rankChange > 0 ? 'ļ¼˛' : 'ļ¼¼'}</div><div>${i.focus}</div></div>`).join('');
    }
    loadData(); setInterval(loadData, 60000);
  </script>
</body>
</html>
